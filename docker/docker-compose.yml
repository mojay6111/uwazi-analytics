version: '3.9'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - uwazi_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://uwazi:uwazi_pass@db:5432/uwazi_db
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - redis
    networks:
      - uwazi_network

  ml_service:
    build:
      context: ../ml
      dockerfile: ../docker/Dockerfile.ml
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://uwazi:uwazi_pass@db:5432/uwazi_db
    volumes:
      - ../ml:/app
    depends_on:
      - db
    networks:
      - uwazi_network

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=uwazi
      - POSTGRES_PASSWORD=uwazi_pass
      - POSTGRES_DB=uwazi_db
    ports:
      - "5433:5432"
    volumes:
      - uwazi_pg_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - uwazi_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - uwazi_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - uwazi_network

volumes:
  uwazi_pg_data:

networks:
  uwazi_network:
    driver: bridge
